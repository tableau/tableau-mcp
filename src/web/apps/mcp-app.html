<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau MCP App</title>
  <script>
    // Server configuration injected by the MCP server
    window.TABLEAU_SERVER_URL = '{{SERVER_URL}}';

    // Load Tableau Embedding API from the configured server
    const script = document.createElement('script');
    script.type = 'module';
    script.src = window.TABLEAU_SERVER_URL;
    document.head.appendChild(script);
  </script>
</head>
<body>
  <main class="main">
    <div id="tableauVizContainer" class="viz-container"></div>
  </main>
  <script type="module" src="/src/mcp-app.ts"></script>
</body>
</html>
